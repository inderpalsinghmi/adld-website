name: Build & Deploy

# Triggers:
#   1. Manual — click "Run workflow" in the GitHub Actions tab (one click)
#   2. Schedule — auto-runs every 6 hours so Notion edits go live automatically
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

# Grant GITHUB_TOKEN permission to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Fetch Notion → Astro build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site (fetches Notion content at build time)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ROOT_PAGE_ID: ${{ secrets.NOTION_ROOT_PAGE_ID }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
